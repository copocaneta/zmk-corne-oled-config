# Enable OLED display with custom status screen
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Custom Bluetooth name
CONFIG_BT_DEVICE_NAME="Corne OLED"

# Increase Bluetooth wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Central: disable WPM and animations (no keystroke overhead)
CONFIG_NICE_OLED_WIDGET_WPM=n

# Peripheral animation: Cat (lightweight, no lag)
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y

# Sleep art: show Sauron when idle
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y

# Uncomment to enable deep sleep (saves battery when idle)
# CONFIG_ZMK_SLEEP=y
